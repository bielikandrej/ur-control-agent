name: ci

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: bielikandrej/ur-control-agent

jobs:
  # -----------------------------------------------------------------
  # Fast feedback on every push + PR: type-check, lint, unit tests.
  # No docker build here — that lands in the `image` job below.
  # -----------------------------------------------------------------
  build-test:
    name: build + test (Node 20)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: npm ci

      - name: Type-check
        run: npm run build

      - name: Lint
        run: npm run lint --if-present

      - name: Test
        run: npm test

  # -----------------------------------------------------------------
  # Build and publish the container image.
  #   - PR:        build only, cache, do not push
  #   - push main: build + push `:edge` + `:sha-<short>`
  #   - tag v*:    build + push `:<semver>` + `:latest`
  # -----------------------------------------------------------------
  image:
    name: docker build + publish
    runs-on: ubuntu-latest
    needs: build-test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=edge,enable={{is_default_branch}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # linux/arm64 is the UR controller architecture (UR20/UR30 run
          # an ARM-based SoC). linux/amd64 lets us smoke-test on a laptop.
          platforms: linux/amd64,linux/arm64

      - name: Image digest
        if: github.event_name != 'pull_request'
        run: echo "${{ steps.meta.outputs.tags }}" && echo "digest=${{ steps.meta.outputs.digest }}"

  # -----------------------------------------------------------------
  # Only on tag pushes: create a GitHub Release with the matching
  # CHANGELOG.md section as the body, plus the auto-generated commit log.
  # -----------------------------------------------------------------
  release:
    name: github release
    runs-on: ubuntu-latest
    needs: image
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract CHANGELOG section for this tag
        id: changelog
        run: |
          # github.ref_name is e.g. "v1.0.0-alpha.1"; CHANGELOG headers are "## [1.0.0-alpha.1]"
          version="${GITHUB_REF_NAME#v}"
          # awk: print lines from "## [<version>]" up to (but not including) the next "## [" header
          notes=$(awk -v v="## [${version}]" '
            $0 ~ "^"v {flag=1; next}
            flag && /^## \[/ {flag=0}
            flag {print}
          ' CHANGELOG.md)
          if [ -z "$notes" ]; then
            notes="See CHANGELOG.md — no entry found for ${version}."
          fi
          {
            echo "notes<<EOF"
            echo "$notes"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ${{ steps.changelog.outputs.notes }}

            ---

            Docker image: `ghcr.io/bielikandrej/ur-control-agent:${{ github.ref_name }}`
            Also published: `ghcr.io/bielikandrej/ur-control-agent:latest`
            Platforms: `linux/amd64`, `linux/arm64`
